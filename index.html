<!DOCTYPE html>
<html lang="pt-br">

<!-- Integrantes: Gabriel Pereira e Gustavo Santos | TADS 2N -->

<head>
    <meta charset="UTF-8" />
    <title>Formulário</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <link rel="stylesheet" href="index.css">
</head>

<body id="background">
    <div id="main-box">
        <header id="header">
            <div id="title">
                <h1 style="padding: 8px; color: white">Formulário de Registro</h1>
            </div>
        </header>
        <form id="form" autocomplete="on">
            <div class="form-spacing">
        
            <div class="subtitle_position"> 
                <h2 id="subtitle_style" style="margin-top: 0px !important;">Informações pessoais </h2>
            </div>
               
              <div class="custom_input">
                <label for="name">Nome</label>
                <input class="input" id="name" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="last-name">Sobrenome</label>
                <input class="input" id="last-name" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="birthday">Data de nascimento</label>
                <input class="input" id="birthday" type="date" />
              </div>
        
              <div class="custom_input">
                <label for="cpf">CPF</label>
                <input class="input" id="cpf" type="text" name="cpf" />
              </div>
        
              <div class="custom_input">
                <label for="email">Email</label>
                <input class="input" id="email" type="email" />
              </div>
        
              <div class="custom_input">
                <label for="phone">Celular (DDD + 9)</label>
                <input class="input" id="phone" type="text" />
              </div>

            <div class="subtitle_position"> 
                <h2 id="subtitle_style">Informações do endereço </h2>
            </div>
           
            <div class="form-spacing">

              <div class="custom_input">
                <label for="cep">CEP</label>
                <input class="input" id="cep" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="country">País</label>
                <input class="input" id="country" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="state">Estado</label>
                <input class="input" id="state" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="city">Cidade</label>
                <input class="input" id="city" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="neighborhood">Bairro</label>
                <input class="input" id="neighborhood" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="street">Rua</label>
                <input class="input" style="width: 500px !important;" id="street" type="text" />
              </div>
        
              <div class="custom_input">
                <label for="residential-number">Número</label>
                <input class="input" id="residential-number" type="text" />
              </div>
            </div>
            </div>

            <label for="profissao">Profissão:</label>
            <div class="select-container">
                <select class="select-custom" name="profissao">
                    <option value="">Selecione sua profissão</option>
                    <option value="Desenvolvedor">Desenvolvedor</option>
                    <option value="Analista">Analista</option>
                    <option value="Gerente de TI">Gerente de TI</option>
                    <option value="Suporte">Suporte</option>
                </select>
            </div>
            <fieldset class="checkbox">
                <legend>Quais linguagens você conhece?</legend>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">CSS</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">JS</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">HTML</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">PHP</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">SQL</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">C</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">C++</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">JAVA</span></label>
                <label class="checkbox-container"><input type="checkbox"><span class="custom-checkbox"></span><span
                        class="checkbox-text">PYTHON</span></label>
            </fieldset>

            <fieldset class="fieldset-custom">
                <legend>Nível de Experiência:</legend>
                <label>
                    <input type="radio" name="nivel" value="jr">
                    <span class="radio-custom"></span>
                    Júnior
                </label>
                <label>
                    <input type="radio" name="nivel" value="pl">
                    <span class="radio-custom"></span>
                    Pleno
                </label>
                <label>
                    <input type="radio" name="nivel" value="sr">
                    <span class="radio-custom"></span>
                    Sênior
                </label>
                <label>
                    <input type="radio" name="nivel" value="mt">
                    <span class="radio-custom"></span>
                    Master
                </label>
            </fieldset>

            <label for="infoAdicional" class="info-custom">Informações Adicionais:</label>
            <textarea id="infoAdicional" name="infoAdicional" rows="4"></textarea>
            <td></td>
            <div>
                <button class="button" type="reset">Limpar</button>
                <button class="button" type="submit">Enviar</button>
            </div>
        </form>
    </div>

    <script src="index.js"></script>
</body>

</html>
